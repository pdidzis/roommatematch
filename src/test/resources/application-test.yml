spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

app:
  jwt:
    secret: testSecretKeyForJwtThatIsAtLeast256BitsLongForHS256Algorithm12345
    expiration: 86400000

server:
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.roommatematch: DEBUG
    org.springframework.web: WARN
    org.hibernate: WARN
